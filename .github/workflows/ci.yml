name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      deploy:
        description: 'Set to true to run deploy manually'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  build-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [20, 22]

    services:
      postgres:
        image: postgres:15-alpine
        ports: ['5432:5432']
        env:
          POSTGRES_DB: notifications_test
          POSTGRES_USER: notifications_user
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd "pg_isready -U notifications_user -d notifications_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']

    env:
      NODE_ENV: test
      PORT: 4321
      DB_HOST: localhost
      DB_PORT: 5432
      DB_NAME: notifications_test
      DB_USERNAME: notifications_user
      DB_PASSWORD: postgres
      REDIS_HOST: localhost
      REDIS_PORT: 6379
      QUEUE_REDIS_HOST: localhost
      QUEUE_REDIS_PORT: 6379
      QUEUE_REDIS_DB: 1
      MAIL_HOST: smtp.invalid
      MAIL_PORT: 465
      MAIL_SECURE: 'true'
      MAIL_USER: no-reply@example.com
      MAIL_PASS: dummy
      API_KEY: test-key
      LOG_LEVEL: warn

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint --max-warnings=0

      - name: Build
        run: npm run build

      - name: Run unit tests
        run: npm test -- --runInBand

      - name: Run e2e tests
        run: npm run test:e2e -- --runInBand

      - name: Build production Docker image (validation)
        run: |
          echo "Building production image to validate Dockerfile..."
          docker build --target production -t notification-service:pr-validation .
          echo "Image built successfully."
          echo "Verifying Dockerfile base Node version is covered by matrix..."
          DOCKER_NODE_VERSION=$(grep -m1 '^FROM node:' Dockerfile | sed -E 's/.*node:([0-9]+).*/\1/')
          echo "Dockerfile base Node major: $DOCKER_NODE_VERSION"
          if ! echo "${{ matrix.node }}" | grep -q "$DOCKER_NODE_VERSION"; then
            echo "::warning::Dockerfile Node $DOCKER_NODE_VERSION not in matrix for this job run (${{ matrix.node }}).";
          fi
        # This ensures Dockerfile stays valid on PRs without pushing

      - name: Upload coverage
        if: success()
        uses: actions/upload-artifact@v5
        with:
          name: coverage-report
          path: coverage

  docker-image:
    runs-on: ubuntu-latest
    needs: build-test
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
      - name: Note
        run: |
          if [ "${GITHUB_REF}" != "refs/heads/main" ]; then
            echo "Built image for validation only (not pushed).";
          fi

  security-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit (low and above)
        run: npm audit --audit-level=low || true

      - name: Trivy scan (filesystem)
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: 'fs'
          ignore-unfixed: true
          format: 'table'
          exit-code: '0'
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - name: Trivy Docker image scan
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: 'ghcr.io/${{ github.repository }}:latest'
          format: 'table'
          ignore-unfixed: true
          exit-code: '0'
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'
        continue-on-error: true

  deploy:
    name: Deploy to Production (SSH)
    runs-on: ubuntu-latest
    needs: [docker-image]
    if: >-
      github.ref == 'refs/heads/main' &&
      !contains(github.event.head_commit.message, '[skip deploy]') &&
      (github.event_name != 'workflow_dispatch' || github.event.inputs.deploy == 'true')
    steps:
      - name: Validate required secrets
        run: |
          missing=0
          for name in PROD_HOST PROD_USER PROD_SSH_KEY PROD_APP_PATH; do
            if [ -z "${!name}" ]; then echo "::error::Missing secret $name"; missing=1; fi
          done
          if [ "$missing" = "1" ]; then exit 1; fi
        env:
          PROD_HOST: ${{ secrets.PROD_HOST }}
          PROD_USER: ${{ secrets.PROD_USER }}
          PROD_SSH_KEY: ${{ secrets.PROD_SSH_KEY }}
          PROD_APP_PATH: ${{ secrets.PROD_APP_PATH }}
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          port: ${{ secrets.PROD_SSH_PORT }}
          script_stop: true
          script: |
            set -euo pipefail
            cd "${{ secrets.PROD_APP_PATH }}"
            echo "==> Current directory: $(pwd)"
            echo "==> Fetching latest code"
            git fetch origin main
            git checkout main
            git pull --ff-only origin main
            echo "==> Building updated app service (only)"
            docker compose -f docker-compose.prod.yml build --pull app
            echo "==> Updating running app container"
            docker compose -f docker-compose.prod.yml up -d --no-deps app
            echo "==> Waiting for health"
            ATTEMPTS=15
            SLEEP=5
            for i in $(seq 1 $ATTEMPTS); do
              if docker compose -f docker-compose.prod.yml exec -T app curl -fsS http://localhost:4321/api/v1/health/simple >/dev/null 2>&1; then
                echo "Health check passed on attempt $i"; break; fi
              echo "Waiting ($i/$ATTEMPTS)..."; sleep $SLEEP
              if [ "$i" = "$ATTEMPTS" ]; then
                echo "::error::App failed health check";
                docker compose -f docker-compose.prod.yml logs app | tail -n 200
                exit 1
              fi
            done
            echo "==> Pruning dangling images"
            docker image prune -f >/dev/null 2>&1 || true
            echo "Deployment complete for commit ${GITHUB_SHA:-unknown}" || true
      - name: Post-Deploy Summary
        run: echo "Deployed commit ${{ github.sha }} to production host $HOST"
        env:
          HOST: ${{ secrets.PROD_HOST }}
