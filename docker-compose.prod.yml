services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: notifications_postgres_prod
    environment:
      POSTGRES_DB: notifications_prod
      POSTGRES_USER: notifications_user
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - '5432:5432'
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
      - ./config/postgresql.conf:/etc/postgresql/postgresql.conf
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    healthcheck:
      test:
        ['CMD-SHELL', 'pg_isready -U notifications_user -d notifications_prod']
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped
    networks:
      - notifications_network

  # Redis for Queue Management
  redis:
    image: redis:7-alpine
    container_name: notifications_redis_prod
    ports:
      - '6379:6379'
    volumes:
      - redis_data_prod:/data
      - ./config/redis.conf:/usr/local/etc/redis/redis.conf
    command: redis-server /usr/local/etc/redis/redis.conf --requirepass ${REDIS_PASSWORD}
    healthcheck:
      test:
        [
          'CMD',
          'redis-cli',
          '--no-auth-warning',
          '-a',
          '${REDIS_PASSWORD}',
          'ping',
        ]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped
    networks:
      - notifications_network

  # Notification Service
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: notifications_app_prod
    ports:
      - '4321:4321'
    environment:
      NODE_ENV: production
      PORT: 4321
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: notifications_prod
      DB_USER: notifications_user
      DB_USERNAME: notifications_user
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      QUEUE_REDIS_HOST: redis
      QUEUE_REDIS_PORT: 6379
      QUEUE_REDIS_DB: 1
      MAIL_HOST: mail.neovantis.xyz
      MAIL_PORT: 465
      MAIL_SECURE: 'true'
      MAIL_USER: no-reply@neovantis.xyz
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      LOG_LEVEL: info
      API_KEY: ${API_KEY}
      CORS_ORIGIN: ${CORS_ORIGIN}
      SENTRY_DSN: ${SENTRY_DSN}
    volumes:
      - ./logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:4321/api/v1/health/simple']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 256M
          cpus: '0.25'
    networks:
      - notifications_network

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: notifications_nginx_prod
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./config/nginx.conf:/etc/nginx/nginx.conf
      - ./config/ssl:/etc/ssl
      - ./logs/nginx:/var/log/nginx
    depends_on:
      - app
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost/api/v1/health/simple']
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    networks:
      - notifications_network

  # Log aggregation (Optional)
  fluentd:
    image: fluent/fluentd:v1.16-debian-1
    container_name: notifications_fluentd_prod
    volumes:
      - ./config/fluentd.conf:/fluentd/etc/fluent.conf
      - ./logs:/var/log
    depends_on:
      - app
    restart: unless-stopped
    networks:
      - notifications_network

volumes:
  postgres_data_prod:
    driver: local
  redis_data_prod:
    driver: local

networks:
  notifications_network:
    driver: bridge
